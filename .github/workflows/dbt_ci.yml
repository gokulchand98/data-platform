name: dbt CI pipeline

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'
      - '.github/workflows/dbt_ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dbt/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  DBT_VERSION: "1.7.9"
  DBT_BIGQUERY_VERSION: "1.7.7"

jobs:
  dbt-ci:
    name: dbt run and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: install dbt and dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "dbt-core==${{ env.DBT_VERSION }}" \
            "dbt-bigquery==${{ env.DBT_BIGQUERY_VERSION }}" \
            "protobuf==4.25.3" \
            "numpy<2"

      - name: authenticate to google cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          python3 << 'EOF'
          import os, json

          key_raw = os.environ['GCP_SA_KEY']
          key_json = json.loads(key_raw)

          profiles = f"""data_platform:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account-json
                project: data-platform-portfolio
                dataset: dbt_ci
                location: US
                keyfile_json:
                  type: {key_json['type']}
                  project_id: {key_json['project_id']}
                  private_key_id: {key_json['private_key_id']}
                  private_key: '{key_json['private_key']}'
                  client_email: {key_json['client_email']}
                  client_id: {key_json['client_id']}
                  auth_uri: {key_json['auth_uri']}
                  token_uri: {key_json['token_uri']}
                  auth_provider_x509_cert_url: {key_json['auth_provider_x509_cert_url']}
                  client_x509_cert_url: {key_json['client_x509_cert_url']}
                threads: 4
                timeout_seconds: 300
                priority: interactive
          """

          with open(os.path.expanduser('~/.dbt/profiles.yml'), 'w') as f:
              f.write(profiles)

          print("profiles.yml written successfully")
          EOF
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: dbt debug
        working-directory: ./dbt
        run: dbt debug

      - name: dbt run
        working-directory: ./dbt
        run: dbt run --target ci

      - name: dbt test
        working-directory: ./dbt
        run: dbt test --target ci

      - name: dbt docs generate
        working-directory: ./dbt
        run: dbt docs generate --target ci
        if: github.ref == 'refs/heads/main'

      - name: upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt/target/
          retention-days: 30
        if: github.ref == 'refs/heads/main'