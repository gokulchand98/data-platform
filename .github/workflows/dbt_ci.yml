name: dbt CI pipeline

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'
      - '.github/workflows/dbt_ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dbt/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DBT_PROFILES_DIR: ./dbt
  PYTHON_VERSION: "3.11"
  DBT_VERSION: "1.7.9"
  DBT_BIGQUERY_VERSION: "1.7.7"

jobs:
  dbt-ci:
    name: dbt run and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: install dbt and dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "dbt-core==${{ env.DBT_VERSION }}" \
            "dbt-bigquery==${{ env.DBT_BIGQUERY_VERSION }}" \
            "protobuf==4.25.3" \
            "numpy<2"

      - name: authenticate to google cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: create dbt profiles.yml for CI
        run: |
          cat > dbt/profiles.yml << 'PROFILES_EOF'
          data_platform:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account-json
                project: data-platform-portfolio
                dataset: dbt_ci
                location: US
                keyfile_json: $GCP_SA_KEY_JSON
                threads: 4
                timeout_seconds: 300
                priority: interactive
          PROFILES_EOF
          # inject the actual key JSON
          python3 - << 'PYEOF'
          import os, json
          key = os.environ['GCP_SA_KEY']
          with open('dbt/profiles.yml', 'r') as f:
              content = f.read()
          with open('dbt/profiles.yml', 'w') as f:
              f.write(content.replace('$GCP_SA_KEY_JSON', key))
          PYEOF
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: dbt debug
        working-directory: ./dbt
        run: dbt debug

      - name: dbt run
        working-directory: ./dbt
        run: dbt run --target ci

      - name: dbt test
        working-directory: ./dbt
        run: dbt test --target ci

      - name: dbt docs generate
        working-directory: ./dbt
        run: dbt docs generate --target ci
        if: github.ref == 'refs/heads/main'

      - name: upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt/target/
          retention-days: 30
        if: github.ref == 'refs/heads/main'