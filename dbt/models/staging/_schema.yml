version: 2

models:

  - name: stg_customers
    description: "Cleaned customers — one row per customer"
    columns:
      - name: customer_id
        description: "Primary key"
        tests: [unique, not_null]
      - name: email
        description: "Lowercased unique email"
        tests: [unique, not_null]
      - name: country_code
        tests: [not_null]

  - name: stg_orders
    description: "Cleaned orders — one row per order"
    columns:
      - name: order_id
        description: "Primary key"
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ["pending", "confirmed", "shipped", "delivered", "cancelled"]
      - name: total_amount
        tests: [not_null]

  - name: stg_products
    description: "Cleaned products — one row per product"
    columns:
      - name: product_id
        description: "Primary key"
        tests: [unique, not_null]
      - name: price
        tests: [not_null]

  - name: stg_order_items
    description: "Cleaned order items — one row per line item"
    columns:
      - name: order_item_id
        description: "Primary key"
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: line_total
        tests: [not_null]