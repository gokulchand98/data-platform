version: 2

sources:
  - name: ecommerce
    description: "Raw e-commerce data loaded from Postgres"
    database: data-platform-portfolio
    schema: ecommerce
    tables:
      - name: customers
        description: "One row per registered customer"
      - name: orders
        description: "One row per placed order"
      - name: products
        description: "One row per product in the catalog"
      - name: order_items
        description: "One row per line item within an order"