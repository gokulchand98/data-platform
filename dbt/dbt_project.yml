name: data_platform
version: "1.0.0"
config-version: 2

profile: data_platform

model-paths:    ["models"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]

target-path:    "target"
clean-targets:  ["target", "dbt_packages"]

models:
  data_platform:

    staging:
      +materialized: view        # staging models are views — no storage cost
      +schema: staging

    marts:
      +materialized: table       # marts are tables — fast query performance
      core:
        +schema: core
      finance:
        +schema: finance