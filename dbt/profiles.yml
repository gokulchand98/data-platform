data_platform:
  target: dev
  outputs:
    dev:
      type: postgres
      host: localhost
      port: 5432
      user: platform
      password: platform
      dbname: ecommerce
      schema: dbt_dev
      threads: 4
      connect_timeout: 10

    prod:
      type: postgres
      host: "{{ env_var('DBT_HOST') }}"
      port: 5432
      user: "{{ env_var('DBT_USER') }}"
      password: "{{ env_var('DBT_PASSWORD') }}"
      dbname: ecommerce
      schema: dbt_prod
      threads: 8
      connect_timeout: 10