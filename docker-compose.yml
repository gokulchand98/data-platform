version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  env_file: .env
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://platform:platform@postgres/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── Source database ──────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: platform_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "platform"]
      interval: 10s
      retries: 5

  # ── S3 emulation (LocalStack) ─────────────────────────────
  localstack:
    image: localstack/localstack:3
    container_name: platform_localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      retries: 5

  # ── Airflow ───────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: platform_airflow_web
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: platform_airflow_scheduler
    command: scheduler

  airflow-init:
    <<: *airflow-common
    container_name: platform_airflow_init
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@platform.com"
    restart: "no"

  # ── BI layer ──────────────────────────────────────────────
  metabase:
    image: metabase/metabase:v0.48.6
    container_name: platform_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: platform
      MB_DB_PASS: platform
      MB_DB_HOST: postgres

volumes:
  postgres_data:
  localstack_data:
  airflow_logs: